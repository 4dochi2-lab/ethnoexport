<!DOCTYPE html>
<html lang="az" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daxil ol / Qeydiyyat — EthnoExport</title>
<meta name="theme-color" content="#B5673A">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="assets/app.css">
</head>
<body>
<header class="nav"><div class="wrap nav-in">
  <a href="index.html" class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2 4 6v6c0 5 3.5 8 8 10 4.5-2 8-5 8-10V6l-8-4Z"/><path d="M12 8v8M8 12h8"/></svg>Ethno<b>Export</b></a>
  <div class="nav-actions">
    <button class="theme-btn" data-theme-btn aria-label="Rejim">
      <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg>
      <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
    </button>
    <a href="index.html" class="btn ghost sm">← Ana səhifə</a>
  </div>
</div></header>

<div class="auth-wrap"><div class="auth-card card">
  <div class="eyebrow">Sənətkar hesabı</div>
  <h1 id="title">Xoş gəldin</h1>
  <p class="sub" id="sub">Hesabına daxil ol və məhsullarını izlə.</p>

  <div class="tabs">
    <button id="tLogin" class="on" onclick="mode('login')">Daxil ol</button>
    <button id="tReg" onclick="mode('reg')">Qeydiyyat</button>
  </div>

  <div id="msg"></div>

  <!-- LOGIN -->
  <form id="loginForm">
    <div class="field"><label>E-poçt</label><input type="email" id="lEmail" placeholder="ad@example.com" required></div>
    <div class="field"><label>Şifrə</label><input type="password" id="lPass" placeholder="••••••••" required></div>
    <button class="btn wide" type="submit">Daxil ol</button>
  </form>

  <!-- REGISTER -->
  <form id="regForm" style="display:none">
    <div class="field"><label>Ad, Soyad</label><input type="text" id="rName" placeholder="Rəsim Quliyev" required></div>
    <div class="field"><label>E-poçt</label><input type="email" id="rEmail" placeholder="ad@example.com" required></div>
    <div class="field"><label>Kart nömrəsi (ödəniş üçün)</label><input type="text" id="rCard" placeholder="M10 / Birbank / Leobank — **** 1234" required><div class="hint">Pulun bu karta köçürüləcək. İstənilən vaxt dəyişə bilərsən.</div></div>
    <div class="field"><label>Şifrə</label><input type="password" id="rPass" placeholder="Ən azı 4 simvol" minlength="4" required></div>
    <button class="btn wide" type="submit">Hesab yarat</button>
  </form>

  <div class="admin-link">Komanda üzvüsən? <a href="admin.html">Admin girişi →</a></div>
</div></div>

<script src="assets/app.js"></script>
<script>
// if already logged in, go to panel
const s=EE.session(); if(s) location.href = s.role==='admin'?'admin.html':'panel.html';

function mode(m){
  const login=m==='login';
  document.getElementById('loginForm').style.display=login?'block':'none';
  document.getElementById('regForm').style.display=login?'none':'block';
  document.getElementById('tLogin').classList.toggle('on',login);
  document.getElementById('tReg').classList.toggle('on',!login);
  document.getElementById('title').textContent=login?'Xoş gəldin':'Hesab yarat';
  document.getElementById('sub').textContent=login?'Hesabına daxil ol və məhsullarını izlə.':'Bir neçə saniyə — dünyaya çıxmağa hazırsan.';
  document.getElementById('msg').innerHTML='';
}
function err(t){document.getElementById('msg').innerHTML='<div class="err">'+t+'</div>'}

document.getElementById('loginForm').onsubmit=e=>{
  e.preventDefault();
  try{const role=EE.login({email:lEmail.value,pass:lPass.value});
    location.href=role==='admin'?'admin.html':'panel.html';
  }catch(x){err(x.message)}
};
document.getElementById('regForm').onsubmit=e=>{
  e.preventDefault();
  try{EE.register({name:rName.value.trim(),email:rEmail.value,pass:rPass.value,card:rCard.value.trim()});
    location.href='panel.html';
  }catch(x){err(x.message)}
};
</script>
</body>
</html>
