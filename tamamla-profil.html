<!DOCTYPE html>
<html lang="az" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Profili tamamla — EthnoExport</title>
<meta name="theme-color" content="#0E7C6B">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="assets/app.css">
</head>
<body>
<header class="nav"><div class="wrap nav-in">
  <a href="index.html" class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9.2"/><path d="M12 5.4c4.8 1.8 4.8 8.3 0 10.4c-3.6 1.5-5.4-2.4-3.9-5c.8-1.4 3.2-1.9 4.3-.2"/></svg>Ethno<b>Export</b></a>
  <button class="btn ghost sm" onclick="EE.signOut()">Çıxış</button>
</div></header>

<div class="auth-wrap"><div class="auth-card card">
  <div class="eyebrow">Bir addım qaldı</div>
  <h1>Profilinizi tamamlayın</h1>
  <p class="sub">Sizinlə əlaqə və ödəniş üçün bu məlumatlar lazımdır.</p>
  <div id="msg"></div>
  <form id="f">
    <div class="field"><label>Ad, Soyad</label><input type="text" id="name" placeholder="Rəsim Quliyev" required></div>
    <div class="field"><label>Əlaqə nömrəsi</label><input type="tel" id="phone" placeholder="+994 __ ___ __ __" required></div>
    <div class="field"><label>Yaşadığınız yer (şəhər / kənd)</label><input type="text" id="loc" placeholder="məs. Lahıc, İsmayıllı" required></div>
    <div class="field"><label>Sənətkarlıq növü</label>
      <select id="craft" required onchange="document.getElementById('otherWrap').style.display=(this.value==='Digər')?'block':'none'">
        <option value="">Seçin…</option>
        <option>Mis</option><option>Xalça</option><option>Gümüş</option><option>Ağac</option><option>Keramika</option><option>Digər</option>
      </select>
    </div>
    <div class="field" id="otherWrap" style="display:none"><label>Sənətkarlıq növünü yazın</label><input type="text" id="craftOther" placeholder="məs. şüşə üfürmə, keçə…"></div>
    <div class="field"><label>Əl işləri saytı <span class="opt">(varsa)</span></label><input type="text" id="web" placeholder="https://..."></div>
    <div class="field"><label>Sosial media mağazası <span class="opt">(varsa)</span></label><input type="text" id="social" placeholder="Instagram / TikTok / Facebook"></div>
    <button class="btn wide" type="submit">Yadda saxla və davam et</button>
  </form>
</div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/app.js"></script>
<script>
const $=id=>document.getElementById(id);
(async()=>{
  const s=await EE.getSession();
  if(!s){location.href='daxil.html';return;}
  const p=await EE.getProfile();
  if(p&&p.name){location.href='panel.html';return;} // artıq tamamlanıb
  // pre-fill name from Google if available
  const {data:{user}}=await EE.SB.auth.getUser();
  if(user&&user.user_metadata&&user.user_metadata.full_name) $('name').value=user.user_metadata.full_name;
})();
$('f').onsubmit=async e=>{
  e.preventDefault();$('msg').innerHTML='';
  const b=e.submitter;b.disabled=true;b.textContent='Gözləyin…';
  const craft=$('craft').value==='Digər'?($('craftOther').value.trim()||'Digər'):$('craft').value;
  try{
    await EE.saveProfile({name:$('name').value.trim(),phone:$('phone').value.trim(),
      location:$('loc').value.trim(),craft:craft,
      website:$('web').value.trim()||null,social:$('social').value.trim()||null});
    location.href='panel.html';
  }catch(x){$('msg').innerHTML='<div class="err">'+x.message+'</div>';b.disabled=false;b.textContent='Yadda saxla və davam et';}
};
</script>
</body>
</html>
