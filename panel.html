<!DOCTYPE html>
<html lang="az" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panelim — EthnoExport</title>
<meta name="theme-color" content="#B5673A">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="assets/app.css">
</head>
<body>
<header class="nav"><div class="wrap nav-in">
  <a href="index.html" class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2 4 6v6c0 5 3.5 8 8 10 4.5-2 8-5 8-10V6l-8-4Z"/><path d="M12 8v8M8 12h8"/></svg>Ethno<b>Export</b></a>
  <div class="nav-actions">
    <span class="who">Salam, <b id="uName">Sənətkar</b></span>
    <button class="theme-btn" data-theme-btn aria-label="Rejim">
      <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg>
      <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
    </button>
    <button class="btn ghost sm" onclick="EE.logout()">Çıxış</button>
  </div>
</div></header>

<div class="page"><div class="wrap">
  <div class="admin-hero reveal">
    <div class="eyebrow">Sənətkar paneli</div>
    <h1>Xoş gəldin, <span id="heroName">Sənətkar</span></h1>
    <div class="live-dot"><i></i> Məhsullarını izlə · pul birbaşa kartına</div>
  </div>

  <div class="stat-row">
    <div class="stat-c card reveal"><div class="n" id="stTotal">0</div><div class="l">Ümumi məhsul</div></div>
    <div class="stat-c card reveal"><div class="n" id="stLive">0</div><div class="l">Satışdadır</div></div>
    <div class="stat-c card reveal"><div class="n" id="stSold">0</div><div class="l">Satıldı</div></div>
    <div class="stat-c card reveal"><div class="n" id="stPaid">0</div><div class="l">Kartıma köçürüldü (₼)</div></div>
  </div>

  <div class="grid2">
    <!-- SUBMIT FORM -->
    <div class="card" style="padding:24px">
      <div class="sec-title">Yeni məhsul göndər</div>
      <div id="pmsg"></div>
      <form id="pForm">
        <div class="field">
          <label>Məhsulun şəkli</label>
          <div class="uploader" id="drop" onclick="fileInp.click()">
            <div id="upEmpty">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="6" width="18" height="14" rx="2"/><circle cx="12" cy="13" r="3.5"/><path d="M8.5 6l1-2h5l1 2"/></svg>
              <div>Şəkil çək və ya seç</div>
            </div>
            <img id="prev" style="display:none">
          </div>
          <input type="file" id="fileInp" accept="image/*" capture="environment" style="display:none">
        </div>
        <div class="field">
          <label>Material</label>
          <select id="mat"><option>Mis</option><option>Xalça</option><option>Gümüş</option><option>Ağac</option><option>Keramika</option></select>
        </div>
        <div class="field">
          <label>Cibinə düşməsini istədiyin təmiz məbləğ (₼)</label>
          <input type="number" id="manat" min="10" step="5" value="50" required>
        </div>
        <div class="calcbox" id="calcBox"></div>
        <button class="btn wide" type="submit">Göndər</button>
        <div class="hint" style="text-align:center;margin-top:10px">Elan mətnini biz hazırlayırıq — sənə heç nə yazmaq lazım deyil.</div>
      </form>
    </div>

    <!-- LIST -->
    <div>
      <div class="sec-title">Göndərdiklərim <span class="count" id="listCount">0</span></div>
      <div class="plist" id="list"></div>
    </div>
  </div>
</div></div>

<script src="assets/app.js"></script>
<script>
const s=EE.requireRole('artisan');
const user=EE.currentUser();
if(user){const fn=user.name.split(' ')[0];uName.textContent=fn;heroName.textContent=fn;}

// photo preview (as dataURL, downscaled)
let photoData=null;
fileInp.onchange=e=>{
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=()=>{
    const img=new Image();
    img.onload=()=>{
      const cv=document.createElement('canvas');const max=600;
      let{width:w,height:h}=img; const sc=Math.min(1,max/Math.max(w,h)); w*=sc;h*=sc;
      cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h);
      photoData=cv.toDataURL('image/jpeg',0.8);
      prev.src=photoData;prev.style.display='block';upEmpty.style.display='none';
    };img.src=r.result;
  };r.readAsDataURL(f);
};

// live calc
function renderCalc(){
  const m=+manat.value||0, c=EE.calc(m);
  calcBox.innerHTML=`
    <div class="r"><span>Sənin təmiz məbləğin</span><b>${m} ₼</b></div>
    <div class="r"><span>+ Çatdırılma & bazar & 15% xidmət</span><b>~$${c.ship+c.svc+c.mkt}</b></div>
    <div class="r fin"><span>Alıcının görəcəyi qiymət</span><b>$${c.landed}</b></div>`;
}
manat.oninput=renderCalc; renderCalc();

pForm.onsubmit=e=>{
  e.preventDefault();
  if(+manat.value<10){pmsg.innerHTML='<div class="err">Məbləğ ən azı 10 ₼ olmalıdır.</div>';return;}
  EE.addProduct({owner:s.email,ownerName:user.name,material:mat.value,manat:manat.value,photo:photoData});
  EE.toast('Göndərildi! Komandamız yoxlayıb Etsy-də dərc edəcək.');
  photoData=null;prev.style.display='none';upEmpty.style.display='block';fileInp.value='';manat.value=50;renderCalc();
  render();
};

let firstRender=true;
function render(){
  const ps=EE.myProducts(s.email);
  listCount.textContent=ps.length;
  const total=ps.length,
    live=ps.filter(p=>p.status==='live').length,
    sold=ps.filter(p=>p.status==='sold'||p.status==='paid').length,
    paid=ps.filter(p=>p.status==='paid').reduce((a,p)=>a+p.manat,0);
  if(firstRender){EE.countUp(stTotal,total);EE.countUp(stLive,live);EE.countUp(stSold,sold);EE.countUp(stPaid,paid);firstRender=false;}
  else{stTotal.textContent=total;stLive.textContent=live;stSold.textContent=sold;stPaid.textContent=paid;}
  if(!ps.length){list.innerHTML=`<div class="card empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="3" y="6" width="18" height="14" rx="2"/><circle cx="12" cy="13" r="3.5"/></svg><div>Hələ məhsul göndərməmisən.<br>Soldan ilk məhsulunu göndər.</div></div>`;return;}
  list.innerHTML=ps.map(p=>`
    <div class="card pitem reveal">
      <div class="pthumb">${p.photo?`<img src="${p.photo}" style="width:100%;height:100%;object-fit:cover;border-radius:12px">`:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="3" y="6" width="18" height="14" rx="2"/><circle cx="12" cy="13" r="3.5"/></svg>`}</div>
      <div class="pmeta">
        <b>${p.material} əşyası</b>
        <div class="row"><span>İstədiyin: <b>${p.manat} ₼</b></span><span>Etsy: <b>$${p.landed}</b></span></div>
        ${EE.pipeline(p.status)}
      </div>
      <div class="pright">${EE.statusBadge(p.status)}${p.status==='paid'?'<span class="hint">kartına köçürüldü</span>':''}</div>
    </div>`).join('');
  EE.reveal(list);
}
render();
EE.reveal();
</script>
</body>
</html>
