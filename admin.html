<!DOCTYPE html>
<html lang="az" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Admin — EthnoExport</title>
<meta name="theme-color" content="#B5673A">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="assets/app.css">
</head>
<body>
<header class="nav"><div class="wrap nav-in">
  <a href="index.html" class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2 4 6v6c0 5 3.5 8 8 10 4.5-2 8-5 8-10V6l-8-4Z"/><path d="M12 8v8M8 12h8"/></svg>Ethno<b>Export</b> · Admin</a>
  <div class="nav-actions">
    <button class="theme-btn" data-theme-btn aria-label="Rejim">
      <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg>
      <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
    </button>
    <button class="btn ghost sm" onclick="EE.signOut()">Çıxış</button>
  </div>
</div></header>

<div class="page"><div class="wrap">
  <div class="admin-hero reveal">
    <div class="eyebrow">Komanda paneli</div>
    <h1>Bütün göndərişlər</h1>
    <div class="live-dot"><i></i> Canlı axın · sənətkarlardan gələn məhsullar real-time yenilənir</div>
  </div>

  <div class="stat-row">
    <div class="stat-c card reveal"><div class="n" id="aWait">0</div><div class="l">Yeni · QC gözləyir</div></div>
    <div class="stat-c card reveal"><div class="n" id="aLive">0</div><div class="l">Etsy-də canlı</div></div>
    <div class="stat-c card reveal"><div class="n" id="aSold">0</div><div class="l">Satıldı</div></div>
    <div class="stat-c card reveal"><div class="n" id="aPay">0</div><div class="l">Ödəniş gözləyir (₼)</div></div>
  </div>

  <div class="analytics">
    <div class="chart-card card reveal">
      <h3>Status üzrə bölgü <span class="sub" id="chTotal">0 məhsul</span></h3>
      <div id="chart"></div>
    </div>
    <div class="chart-card card reveal">
      <h3>Gəlir</h3>
      <div class="rev-big" id="revPaid">0 ₼</div>
      <div class="rev-sub">sənətkarlara ödənilib</div>
      <div class="rev-split">
        <div><div class="rv" id="revPending" style="color:var(--gold)">0 ₼</div><div class="rl">ödəniş gözləyir</div></div>
        <div><div class="rv" id="revFee" style="color:var(--copper)">$0</div><div class="rl">platforma haqqı (~15%)</div></div>
      </div>
    </div>
  </div>

  <div class="toolbar reveal">
    <div class="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="q" placeholder="Sənətkar və ya material axtar…">
    </div>
    <button class="btn ghost sm" onclick="exportCSV()">CSV yüklə</button>
  </div>

  <div class="filters reveal" id="filters">
    <button class="on" data-f="all">Hamısı</button>
    <button data-f="wait">Gözləyir</button>
    <button data-f="qc">QC</button>
    <button data-f="live">Canlı</button>
    <button data-f="sold">Satıldı</button>
    <button data-f="paid">Ödənildi</button>
  </div>

  <div class="plist" id="list"></div>
</div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/app.js"></script>
<script>
let filter='all', query='', ALL=[];
document.querySelectorAll('#filters button').forEach(b=>b.onclick=()=>{
  filter=b.dataset.f;
  document.querySelectorAll('#filters button').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');render(true);
});
document.getElementById('q').addEventListener('input',e=>{query=e.target.value.trim().toLowerCase();render(true);});

const CHART_COL={wait:'#C9A24B',qc:'#B5673A',live:'#3a7bd5',sold:'#1F6E5C',paid:'#155445'};
function renderChart(all){
  const max=Math.max(1,...EE.STAGES.map(s=>all.filter(p=>p.status===s).length));
  chTotal.textContent=all.length+' məhsul';
  chart.innerHTML=EE.STAGES.map(s=>{
    const n=all.filter(p=>p.status===s).length, w=Math.round(n/max*100);
    return `<div class="bar-row"><span class="bl">${EE.STATUS[s]}</span>
      <div class="bar-track"><div class="bar-fill" style="background:${CHART_COL[s]};width:${n?w:0}%">${n||''}</div></div>
      <span class="bv">${n}</span></div>`;
  }).join('');
}
function renderRevenue(all){
  const paid=all.filter(p=>p.status==='paid').reduce((a,p)=>a+p.manat,0);
  const pending=all.filter(p=>p.status==='sold').reduce((a,p)=>a+p.manat,0);
  const fee=Math.round(all.filter(p=>p.status==='paid'||p.status==='sold').reduce((a,p)=>a+p.landed*0.15,0));
  revPaid.textContent=paid+' ₼';revPending.textContent=pending+' ₼';revFee.textContent='$'+fee;
}
function exportCSV(){
  const rows=[['ID','Sənətkar','Material','İstək (AZN)','Landed (USD)','Status','AI başlıq']];
  ALL.forEach(p=>rows.push([p.id,p.owner_name,p.material,p.manat,p.landed,EE.STATUS[p.status],'"'+(p.title||'').replace(/"/g,'""')+'"']));
  const csv='﻿'+rows.map(r=>r.join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download='ethnoexport-gonderishler.csv';a.click();
  EE.toast('CSV yükləndi','info');
}
window.exportCSV=exportCSV;

const NEXT={wait:'qc',qc:'live',live:'sold',sold:'paid'};
const ALABEL={qc:'QC-yə götür',live:'Etsy-də dərc et',sold:'Satıldı işarələ',paid:'Kartına ödə'};
const DONE_MSG={qc:'QC-yə götürüldü',live:'Etsy mağazasında dərc olundu 🌍',sold:'Satıldı — SMS göndərildi',paid:'Kartına köçürüldü'};

function actionBtn(p){
  const nx=NEXT[p.status]; if(!nx)return '';
  const cls=nx==='paid'?'pat':(nx==='sold'?'pat':'');
  const label=nx==='paid'?`Kartına ödə (${p.manat} ₼)`:ALABEL[nx];
  return `<button class="btn sm ${cls}" onclick="act('${p.id}','${nx}')">${label}</button>`;
}

window.act=async(id,st)=>{
  try{await EE.setStatus(id,st);}catch(x){EE.toast(x.message,'info');return;}
  EE.toast(DONE_MSG[st]||'Yeniləndi', st==='paid'?'pay':(st==='live'?'info':''));
  if(st==='paid')confetti();
  await load(true);
  requestAnimationFrame(()=>{const el=document.querySelector(`[data-id="${id}"]`);if(el){el.classList.add('flash');setTimeout(()=>el.classList.remove('flash'),700);}});
};

function confetti(){
  const cols=['#B5673A','#1F6E5C','#C9A24B','#8C4A28','#3a7bd5'];
  for(let i=0;i<70;i++){
    const c=document.createElement('div');c.className='confetti';
    c.style.left=Math.random()*100+'vw';
    c.style.background=cols[i%cols.length];
    c.style.animationDuration=(1.6+Math.random()*1.4)+'s';
    c.style.animationDelay=(Math.random()*.3)+'s';
    document.body.appendChild(c);setTimeout(()=>c.remove(),3200);
  }
}

function render(skipStats){
  const all=ALL;
  if(!skipStats){
    EE.countUp(aWait, all.filter(p=>p.status==='wait'||p.status==='qc').length);
    EE.countUp(aLive, all.filter(p=>p.status==='live').length);
    EE.countUp(aSold, all.filter(p=>p.status==='sold').length);
    EE.countUp(aPay,  all.filter(p=>p.status==='sold').reduce((a,p)=>a+p.manat,0));
  }else{
    aWait.textContent=all.filter(p=>p.status==='wait'||p.status==='qc').length;
    aLive.textContent=all.filter(p=>p.status==='live').length;
    aSold.textContent=all.filter(p=>p.status==='sold').length;
    aPay.textContent=all.filter(p=>p.status==='sold').reduce((a,p)=>a+p.manat,0);
  }
  renderChart(all);renderRevenue(all);
  let ps=filter==='all'?all:all.filter(p=>p.status===filter);
  if(query)ps=ps.filter(p=>(p.ownerName+' '+p.material).toLowerCase().includes(query));
  if(!ps.length){list.innerHTML='<div class="card empty"><div>'+(query?'“'+query+'” üzrə nəticə yoxdur.':'Bu bölmədə göndəriş yoxdur.')+'</div></div>';return;}
  list.innerHTML=ps.map(p=>`
    <div class="card pitem reveal" data-id="${p.id}" style="grid-template-columns:88px 1fr auto">
      <div class="pthumb">${p.photo_url?`<img src="${p.photo_url}" style="width:100%;height:100%;object-fit:cover;border-radius:12px">`:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="3" y="6" width="18" height="14" rx="2"/><circle cx="12" cy="13" r="3.5"/></svg>`}</div>
      <div class="pmeta">
        <b>${p.material} · ${p.owner_name}</b>
        <div class="row"><span>İstək: <b>${p.manat} ₼</b></span><span>Landed: <b>$${p.landed}</b></span><span>Etsy: <b>$${Math.round(p.landed*1.08)}</b></span></div>
        <div class="ai-mini"><b>AI başlıq:</b> ${p.title}<br><b>${p.tags.length} tag:</b> ${p.tags.slice(0,8).join(', ')}…</div>
        ${EE.pipeline(p.status)}
      </div>
      <div class="pright">
        ${EE.statusBadge(p.status)}
        <div class="actions-inline">${actionBtn(p)}</div>
      </div>
    </div>`).join('');
  EE.reveal(list);
}

async function load(skipStats){
  try{ALL=await EE.getProducts();}catch(x){list.innerHTML='<div class="card empty"><div>'+x.message+'</div></div>';return;}
  render(skipStats);
}

(async()=>{
  const g=await EE.requireRole('admin'); if(!g)return;
  await load();
  EE.reveal();
  // real-time: sənətkar məhsul göndərəndə/status dəyişəndə avtomatik yenilə
  EE.subscribe(()=>load(true));
})();
</script>
</body>
</html>
